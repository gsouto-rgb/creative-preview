<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Creative Preview</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- CANVAS BACKGROUND -->
    <canvas id="network-bg"></canvas>

    <!-- HEADER -->
    <div class="header">

        <div class="header-logo">
            <img src="./assets/evolveadslogobranca.png" alt="Evolve Ads">
        </div>

        <div class="header-info">
            <h1>Creative Preview Studio</h1>
        </div>

        <button id="replay-btn">
            ↻ Replay Animations
        </button>

    </div>

    <!-- GRID DE CRIATIVOS -->
    <div class="preview-grid">

        <!-- 120x600 -->
        <div class="creative-wrapper">
            <h3>120x600</h3>
            <div class="creative-container" data-format="120x600" style="width:120px;height:600px;">
                <div class="prod"></div>
                <div class="copy"></div>
                <div class="logo"></div>
                <div class="cta"></div>
            </div>
        </div>

        <!-- 160x600 -->
        <div class="creative-wrapper">
            <h3>160x600</h3>
            <div class="creative-container" data-format="160x600" style="width:160px;height:600px;">
                <div class="prod"></div>
                <div class="copy"></div>
                <div class="logo"></div>
                <div class="cta"></div>
            </div>
        </div>

        <!-- 300x600 -->
        <div class="creative-wrapper">
            <h3>300x600</h3>
            <div class="creative-container" data-format="300x600" style="width:300px;height:600px;">
                <div class="prod"></div>
                <div class="copy"></div>
                <div class="logo"></div>
                <div class="cta"></div>
            </div>
        </div>

        <!-- 300x250 -->

            <h3>300x250</h3>

                <div class="copy"></div>
                <div class="logo"></div>
                <div class="cta"></div>
            </div>
        </div>

        <!-- 300x100 -->
        <div class="creative-wrapper">
            <h3>300x100</h3>
            <div class="creative-container" data-format="300x100" style="width:300px;height:100px;">
                <div class="prod"></div>
                <div class="copy"></div>
                <div class="logo"></div>
                <div class="cta"></div>
            </div>
        </div>

        <!-- 320x100 -->
        <div class="creative-wrapper">
            <h3>320x100</h3>
            <div class="creative-container" data-format="320x100" style="width:320px;height:100px;">
                <div class="prod"></div>
                <div class="copy"></div>
                <div class="logo"></div>
                <div class="cta"></div>
            </div>
        </div>

        <!-- 320x50 -->
        <div class="creative-wrapper">
            <h3>320x50</h3>
            <div class="creative-container" data-format="320x50" style="width:320px;height:50px;">
                <div class="prod"></div>
                <div class="copy"></div>
                <div class="logo"></div>
                <div class="cta"></div>
            </div>
        </div>

        <!-- 728x90 -->
        <div class="creative-wrapper">
            <h3>728x90</h3>
            <div class="creative-container" data-format="728x90" style="width:728px;height:90px;">
                <div class="prod"></div>
                <div class="copy"></div>
                <div class="logo"></div>
                <div class="cta"></div>
            </div>
        </div>

        <!-- 970x250 -->
        <div class="creative-wrapper">
            <h3>970x250</h3>
            <div class="creative-container" data-format="970x250" style="width:970px;height:250px;">
                <div class="prod"></div>

                <div class="logo"></div>
                <div class="cta"></div>
            </div>
        </div>

    </div>

    <!-- BOTÃO DOWNLOAD (FIXO) -->
    <button id="download-btn">
        Download HTML5 Package
    </button>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<script src="script.js"></script>
<script src="export.js"></script>

</body>
</html>
